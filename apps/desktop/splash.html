<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moleui Desktop</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        overflow: hidden;
      }
      .logo {
        width: 120px;
        height: 120px;
        margin-bottom: 24px;
        animation: pulse 2s ease-in-out infinite;
      }
      .title {
        color: #ffffff;
        font-size: 32px;
        font-weight: 600;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }
      .subtitle {
        color: rgba(255, 255, 255, 0.6);
        font-size: 14px;
        font-weight: 400;
      }
      .loading {
        margin-top: 32px;
        width: 120px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      .loading-bar {
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #e94560, #ff6b6b);
        border-radius: 2px;
        animation: loading 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.9; }
      }
      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
  </head>
  <body>
    <img alt="Moleui" class="logo" id="logo" />
    <h1 class="title">Moleui Desktop</h1>
    <p class="subtitle">System Optimization Made Simple</p>
    <div class="loading">
      <div class="loading-bar"></div>
    </div>
    <script>
      const logo = new URLSearchParams(window.location.search).get('logo');

      if (logo) {
        document.getElementById('logo').src = logo;
      }
    </script>
  </body>
</html>
